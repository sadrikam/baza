<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мониторинг Склада - Baza JSON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 8px;
            background-color: #f4f6f9;
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            padding: 12px; /* Было 25px */
            border-radius: 4px; /* Было 8px */
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 15px;
        }
        .search-container {
            margin: 12px 0; /* Было 20px 0 */
            flex-direction: column; /* Было flex без направления (в строку) */
            gap: 8px; /* Было 15px */
        }

        .search-input {
        padding: 10px 12px; /* Было 12px 15px */
        font-size: 16px; /* Было 15px */
        }
        .search-input:focus {
            border-color: #3498db;
        }
        .stats {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }
        th, td {
            padding: 8px 6px; /* Было 12px */
            font-size: 13px; /* Было 14px */
            word-break: break-word; /* Новая строка */
        }
        th {
            background-color: #34495e;
            color: #ffffff;
            text-align: left;
            padding: 12px;
            font-weight: 600;
            position: sticky;
            top: -1px; /* Было 0 */
            z-index: 10; /* Новая строка */
        }
        td {
            /* padding: 12px; */
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .negative-row {
            background-color: #fff5f5;
        }
        .badge-negative {
            color: #e53e3e;
            background-color: #fed7d7;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }
        .loader {
            text-align: center;
            padding: 4px;
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
        }
        .error-msg {
            color: #e53e3e;
            background: #fed7d7;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
        @media (max-width: 480px) {
        /* Скрываем колонку Коэффициент */
        table th:nth-child(6),
        table td:nth-child(6) {
            display: none;
        }
        /* Ужимаем Код, Закуп и Розницу до минимума */
        table th:nth-child(1), table td:nth-child(1),
        table th:nth-child(4), table td:td:nth-child(4),
        table th:nth-child(5), table td:nth-child(5) {
            white-space: nowrap;
            width: 1%;
        }
        /* Выделяем жирным остатки */
        .badge-negative, #tableBody td:nth-child(3) {
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Панель складского учета</h1>
    
    <div class="search-container">
        <input type="text" id="nameSearch" class="search-input" placeholder="Поиск по наименованию номенклатуры...">
        <input type="text" id="codeSearch" class="search-input" placeholder="Поиск по коду товара...">
    </div>

    <div class="stats" id="tableStats">Загрузка данных...</div>
    <div id="loader" class="loader">Синхронизация с базой данных GitHub...</div>
    <div id="errorContainer"></div>
    <div class="table-responsive">
        <table id="dataTable" style="display: none;">
            <thead>
                <tr>
                    <th>Код</th>
                    <th>Наименование, Ед. изм.</th>
                    <th>Остаток</th>
                    <th>Закуп (руб)</th>
                    <th>Розница (руб)</th>
                    <th>Коэфф.</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Строки генерируются динамически -->
            </tbody>
        </table>
    </div>    
</div>

<script>
    // URL raw-файла из репозитория для обхода ограничений CORS GitHub Pages
    //const jsonUrl = 'https://github.com/sadrikam/baza/blob/main/baza.json';
    
    let productsData = [];

    async function loadData() {
        try {
            const response = await fetch('baza.json');
            if (!response.ok) throw new Error(`Ошибка сети: ${response.status}`);
            
            productsData = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';
            
            renderTable(productsData);
        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('errorContainer').innerHTML = `
                <div class="error-msg">
                    <strong>Не удалось загрузить данные.</strong><br>
                    Причина: ${error.message}<br>
                    Обычно это связано с блокировкой CORS. Попробуйте запустить файл через локальный сервер или использовать современный браузер.
                </div>
            `;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach(item => {
            const row = document.createElement('tr');
            
            // Извлекаем и чистим значение остатка
            const rawStock = item["Остаток"] ? item["Остаток"].toString().trim() : "0";
            const stockValue = parseFloat(rawStock.replace(',', '.'));
            
            const isNegative = stockValue < 0;
            if (isNegative) {
                row.classList.add('negative-row');
            }

            // Формируем ячейку остатка с подсветкой
            const stockTd = isNegative 
                ? `<td><span class="badge-negative">${rawStock}</span></td>`
                : `<td>${rawStock}</td>`;

            row.innerHTML = `
                <td>${item["Код"] || ''}</td>
                // Изменено в строке вывода названия номенклатуры
                <td><div style="min-width: 140px;"><strong>${item["Номенклатура, Ед. изм."] || ''}</strong></div></td>
                ${stockTd}
                <td>${item["Закуп"] || '0.00'}</td>
                <td>${item["Розница"] || '0.00'}</td>
                <td>${item["Коэфф"] || ''}</td>
            `;
            tbody.appendChild(row);
        });

        document.getElementById('tableStats').textContent = `Показано позиций: ${data.length} из ${productsData.length}`;
    }

    function filterData() {
        const nameQuery = document.getElementById('nameSearch').value.toLowerCase().trim();
        const codeQuery = document.getElementById('codeSearch').value.toLowerCase().trim();

        const filtered = productsData.filter(item => {
            const name = (item["Номенклатура, Ед. изм."] || '').toLowerCase();
            const code = (item["Код"] || '').toString().toLowerCase();

            const matchesName = name.includes(nameQuery);
            const matchesCode = code.includes(codeQuery);

            return matchesName && matchesCode;
        });

        renderTable(filtered);
    }

    // Слушатели событий ввода для мгновенной фильтрации (debounce не требуется для текущего объема)
    document.getElementById('nameSearch').addEventListener('input', filterData);
    document.getElementById('codeSearch').addEventListener('input', filterData);

    // Запуск инициализации при загрузке страницы
    window.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
