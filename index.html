<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг Склада - Baza JSON</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 15px;
        }
        .search-container {
            margin: 20px 0;
            display: flex;
            gap: 15px;
        }
        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: #3498db;
        }
        .stats {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        th {
            background-color: #34495e;
            color: #ffffff;
            text-align: left;
            padding: 12px;
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .negative-row {
            background-color: #fff5f5;
        }
        .badge-negative {
            color: #e53e3e;
            background-color: #fed7d7;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
        }
        .loader {
            text-align: center;
            padding: 4px;
            font-size: 18px;
            color: #3498db;
            font-weight: bold;
        }
        .error-msg {
            color: #e53e3e;
            background: #fed7d7;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Панель складского учета</h1>
    
    <div class="search-container">
        <input type="text" id="nameSearch" class="search-input" placeholder="Поиск по наименованию номенклатуры...">
        <input type="text" id="codeSearch" class="search-input" placeholder="Поиск по коду товара...">
    </div>

    <div class="stats" id="tableStats">Загрузка данных...</div>
    <div id="loader" class="loader">Синхронизация с базой данных GitHub...</div>
    <div id="errorContainer"></div>

    <table id="dataTable" style="display: none;">
        <thead>
            <tr>
                <th>Код</th>
                <th>Наименование, Ед. изм.</th>
                <th>Остаток</th>
                <th>Закуп (руб)</th>
                <th>Розница (руб)</th>
                <th>Коэфф.</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Строки генерируются динамически -->
        </tbody>
    </table>
</div>

<script>
    // URL raw-файла из репозитория для обхода ограничений CORS GitHub Pages
    const jsonUrl = 'https://github.com/sadrikam/baza/blob/main/baza.json';
    
    let productsData = [];

    async function loadData() {
        try {
            const response = await fetch(jsonUrl);
            if (!response.ok) throw new Error(`Ошибка сети: ${response.status}`);
            
            productsData = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';
            
            renderTable(productsData);
        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('errorContainer').innerHTML = `
                <div class="error-msg">
                    <strong>Не удалось загрузить данные.</strong><br>
                    Причина: ${error.message}<br>
                    Обычно это связано с блокировкой CORS. Попробуйте запустить файл через локальный сервер или использовать современный браузер.
                </div>
            `;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach(item => {
            const row = document.createElement('tr');
            
            // Извлекаем и чистим значение остатка
            const rawStock = item["Остаток"] ? item["Остаток"].toString().trim() : "0";
            const stockValue = parseFloat(rawStock.replace(',', '.'));
            
            const isNegative = stockValue < 0;
            if (isNegative) {
                row.classList.add('negative-row');
            }

            // Формируем ячейку остатка с подсветкой
            const stockTd = isNegative 
                ? `<td><span class="badge-negative">${rawStock}</span></td>`
                : `<td>${rawStock}</td>`;

            row.innerHTML = `
                <td>${item["Код"] || ''}</td>
                <td><strong>${item["Номенклатура, Ед. изм."] || ''}</strong></td>
                ${stockTd}
                <td>${item["Закуп"] || '0.00'}</td>
                <td>${item["Розница"] || '0.00'}</td>
                <td>${item["Коэфф"] || ''}</td>
            `;
            tbody.appendChild(row);
        });

        document.getElementById('tableStats').textContent = `Показано позиций: ${data.length} из ${productsData.length}`;
    }

    function filterData() {
        const nameQuery = document.getElementById('nameSearch').value.toLowerCase().trim();
        const codeQuery = document.getElementById('codeSearch').value.toLowerCase().trim();

        const filtered = productsData.filter(item => {
            const name = (item["Номенклатура, Ед. изм."] || '').toLowerCase();
            const code = (item["Код"] || '').toString().toLowerCase();

            const matchesName = name.includes(nameQuery);
            const matchesCode = code.includes(codeQuery);

            return matchesName && matchesCode;
        });

        renderTable(filtered);
    }

    // Слушатели событий ввода для мгновенной фильтрации (debounce не требуется для текущего объема)
    document.getElementById('nameSearch').addEventListener('input', filterData);
    document.getElementById('codeSearch').addEventListener('input', filterData);

    // Запуск инициализации при загрузке страницы
    window.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
